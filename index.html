<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>App Dịch Ảnh - Nano Banana</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .drop-zone { transition: all .15s ease; }
  .drop-zone.dragover { background: rgba(59,130,246,.15); border-color: #3b82f6; }
  textarea { font-family: inherit; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

<div class="max-w-7xl mx-auto p-4 md:p-6">
  <header class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold">🖼️ App Dịch Ảnh</h1>
      <p class="text-slate-400 text-sm">Dùng Nano Banana (Gemini) để dịch ảnh giữ nguyên layout</p>
    </div>
    <button id="btnSettings" class="px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm">⚙️ Cài đặt</button>
  </header>

  <!-- Settings panel -->
  <div id="settings" class="hidden bg-slate-900 border border-slate-800 rounded-xl p-4 mb-6 space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">Gemini API Key <span class="text-slate-500">(lưu trong trình duyệt của bạn, không gửi đi đâu)</span></label>
      <input id="apiKey" type="password" placeholder="AIza..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
      <p class="text-xs text-slate-500 mt-1">Lấy key miễn phí tại <a class="text-blue-400 underline" href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <div>
        <label class="block text-sm font-medium mb-1">Ngôn ngữ gốc</label>
        <select id="srcLang" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm"></select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Ngôn ngữ đích</label>
        <select id="dstLang" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm"></select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Model tạo ảnh</label>
        <select id="imgModel" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">
          <option value="canvas">🆓 Canvas Overlay (MIỄN PHÍ, không cần billing) ⭐</option>
          <option value="gemini-3-pro-image-preview">Nano Banana Pro (cần billing)</option>
          <option value="gemini-2.5-flash-image-preview">Nano Banana 2.5 Flash (cần billing)</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Độ phân giải</label>
        <select id="imgSize" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">
          <option value="1K">1K (nhanh, rẻ)</option>
          <option value="2K">2K</option>
          <option value="4K">4K (đẹp, chậm)</option>
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Số ô ảnh</label>
      <input id="slotCount" type="number" min="1" max="12" value="6" class="w-24 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
    </div>
    <button id="btnSaveSettings" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-sm font-medium">Lưu</button>
  </div>

  <!-- Actions -->
  <div class="flex flex-wrap gap-2 mb-4 sticky top-2 z-10 bg-slate-950/80 backdrop-blur py-2">
    <button id="btnTranslateAll" class="px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-sm font-medium">📝 Bước 1: Dịch tất cả</button>
    <button id="btnGenerateAll" class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-sm font-medium">🎨 Bước 2: Tạo ảnh tất cả</button>
    <button id="btnDownloadZip" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium">📦 Tải ZIP</button>
    <button id="btnClear" class="px-4 py-2 rounded-lg bg-rose-900 hover:bg-rose-800 text-sm font-medium ml-auto">🗑️ Xoá hết</button>
  </div>

  <!-- Rows -->
  <div id="rows" class="space-y-3"></div>

  <!-- Log -->
  <div id="log" class="mt-6 text-xs text-slate-400 font-mono whitespace-pre-wrap max-h-40 overflow-auto bg-slate-900 rounded-lg p-3 border border-slate-800"></div>

  <footer class="mt-8 text-center text-xs text-slate-500">
    <p>App chạy hoàn toàn phía client. API key của bạn chỉ lưu trong localStorage trình duyệt này.</p>
  </footer>
</div>

<script type="module">
import { GoogleGenAI } from "https://esm.sh/@google/genai@1.39.0";

// -------- State & storage --------
const LANGS = [
  {c:"auto", n:"Tự nhận diện"},
  {c:"vi", n:"Tiếng Việt"},
  {c:"en", n:"English"},
  {c:"zh", n:"中文 (Trung)"},
  {c:"ja", n:"日本語 (Nhật)"},
  {c:"ko", n:"한국어 (Hàn)"},
  {c:"fr", n:"Français (Pháp)"},
  {c:"es", n:"Español (Tây Ban Nha)"},
];

const settings = {
  apiKey: localStorage.getItem("apiKey") || "",
  srcLang: localStorage.getItem("srcLang") || "auto",
  dstLang: localStorage.getItem("dstLang") || "vi",
  imgModel: localStorage.getItem("imgModel") || "canvas",
  imgSize: localStorage.getItem("imgSize") || "1K",
  slotCount: parseInt(localStorage.getItem("slotCount") || "6", 10),
};

const rows = []; // [{file, dataUrl, mime, translation, resultDataUrl, resultMime}]

// -------- Utilities --------
const $ = (id) => document.getElementById(id);
const logEl = $("log");
function log(msg) {
  const t = new Date().toLocaleTimeString();
  logEl.textContent += `[${t}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function dataUrlToBase64(durl) { return durl.split(",")[1]; }

// -------- Settings UI --------
function initSettingsUI() {
  const sel = (id, val) => {
    const el = $(id);
    el.innerHTML = "";
    for (const l of LANGS) {
      const o = document.createElement("option");
      o.value = l.c; o.textContent = l.n;
      if (l.c === val) o.selected = true;
      el.appendChild(o);
    }
  };
  sel("srcLang", settings.srcLang);
  sel("dstLang", settings.dstLang);
  $("apiKey").value = settings.apiKey;
  $("imgModel").value = settings.imgModel;
  $("imgSize").value = settings.imgSize;
  $("slotCount").value = settings.slotCount;

  $("btnSettings").onclick = () => $("settings").classList.toggle("hidden");
  $("btnSaveSettings").onclick = () => {
    settings.apiKey = $("apiKey").value.trim();
    settings.srcLang = $("srcLang").value;
    settings.dstLang = $("dstLang").value;
    settings.imgModel = $("imgModel").value;
    settings.imgSize = $("imgSize").value;
    settings.slotCount = Math.max(1, Math.min(12, parseInt($("slotCount").value || "6", 10)));
    for (const k of Object.keys(settings)) localStorage.setItem(k, settings[k]);
    $("settings").classList.add("hidden");
    renderRows();
    log("Đã lưu cài đặt.");
  };
  if (!settings.apiKey) $("settings").classList.remove("hidden");
}

// -------- Render rows --------
function renderRows() {
  const container = $("rows");
  container.innerHTML = "";
  while (rows.length < settings.slotCount) rows.push({});
  rows.length = settings.slotCount;

  rows.forEach((row, i) => {
    const r = document.createElement("div");
    r.className = "grid grid-cols-1 md:grid-cols-3 gap-3 bg-slate-900 border border-slate-800 rounded-xl p-3";
    r.innerHTML = `
      <div>
        <div class="text-xs text-slate-400 mb-1">Ảnh gốc ${i+1}</div>
        <div class="drop-zone border-2 border-dashed border-slate-700 rounded-lg h-48 flex items-center justify-center cursor-pointer overflow-hidden bg-slate-950" data-i="${i}">
          ${row.dataUrl ? `<img src="${row.dataUrl}" class="max-h-full max-w-full object-contain" />` : `<span class="text-slate-500 text-sm text-center px-2">Kéo thả hoặc click để chọn ảnh</span>`}
        </div>
        <input type="file" accept="image/*" class="hidden" data-file="${i}" />
      </div>
      <div>
        <div class="text-xs text-slate-400 mb-1 flex justify-between">
          <span>Bản dịch (có thể sửa)</span>
          <button class="text-blue-400 hover:underline" data-translate="${i}">Dịch ô này</button>
        </div>
        <textarea data-text="${i}" placeholder="Nội dung dịch sẽ hiện ở đây sau khi bấm 'Dịch'..." class="w-full h-48 bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm">${row.translation || ""}</textarea>
      </div>
      <div>
        <div class="text-xs text-slate-400 mb-1 flex justify-between">
          <span>Ảnh kết quả</span>
          <span class="flex gap-2">
            <button class="text-blue-400 hover:underline" data-generate="${i}">Tạo ảnh</button>
            ${row.resultDataUrl ? `<button class="text-blue-400 hover:underline" data-download="${i}">Tải</button>` : ""}
          </span>
        </div>
        <div class="border border-slate-700 rounded-lg h-48 flex items-center justify-center bg-slate-950 overflow-hidden">
          ${row.resultDataUrl ? `<img src="${row.resultDataUrl}" class="max-h-full max-w-full object-contain" />` : `<span class="text-slate-600 text-sm">(chưa có)</span>`}
        </div>
      </div>
    `;
    container.appendChild(r);
  });

  // Bind events
  container.querySelectorAll(".drop-zone").forEach(el => {
    const i = +el.dataset.i;
    const fileInput = container.querySelector(`input[data-file="${i}"]`);
    el.onclick = () => fileInput.click();
    el.ondragover = (e) => { e.preventDefault(); el.classList.add("dragover"); };
    el.ondragleave = () => el.classList.remove("dragover");
    el.ondrop = async (e) => {
      e.preventDefault(); el.classList.remove("dragover");
      const f = e.dataTransfer.files[0];
      if (f) await setImage(i, f);
    };
    fileInput.onchange = async (e) => {
      const f = e.target.files[0];
      if (f) await setImage(i, f);
    };
  });
  container.querySelectorAll("[data-text]").forEach(el => {
    el.oninput = () => { rows[+el.dataset.text].translation = el.value; };
  });
  container.querySelectorAll("[data-translate]").forEach(el => {
    el.onclick = () => translateOne(+el.dataset.translate);
  });
  container.querySelectorAll("[data-generate]").forEach(el => {
    el.onclick = () => generateOne(+el.dataset.generate);
  });
  container.querySelectorAll("[data-download]").forEach(el => {
    el.onclick = () => downloadOne(+el.dataset.download);
  });
}

async function setImage(i, file) {
  const durl = await fileToDataUrl(file);
  rows[i] = { file, dataUrl: durl, mime: file.type || "image/png" };
  renderRows();
  log(`Đã nạp ảnh ${i+1}: ${file.name}`);
}

// -------- Gemini calls --------
function getAI() {
  if (!settings.apiKey) {
    alert("Bạn chưa nhập Gemini API key. Mở ⚙️ Cài đặt để nhập.");
    $("settings").classList.remove("hidden");
    throw new Error("no api key");
  }
  return new GoogleGenAI({ apiKey: settings.apiKey });
}

function langName(code) {
  return LANGS.find(l => l.c === code)?.n || code;
}

async function translateOne(i) {
  const row = rows[i];
  if (!row?.dataUrl) { log(`Ô ${i+1}: chưa có ảnh.`); return; }
  const ai = getAI();
  const src = settings.srcLang === "auto" ? "ngôn ngữ trong ảnh" : langName(settings.srcLang);
  const dst = langName(settings.dstLang);
  const isCanvas = settings.imgModel === "canvas";
  const prompt = isCanvas
    ? `Bạn là chuyên gia OCR. Phát hiện TẤT CẢ vùng văn bản trong ảnh (từ ${src}), dịch sang ${dst}.
Trả về CHỈ JSON array (không markdown, không giải thích), mỗi phần tử là 1 vùng text:
[{"box":[ymin,xmin,ymax,xmax],"original":"...","translated":"..."}, ...]
- box là bounding box chuẩn hoá 0-1000 theo [ymin,xmin,ymax,xmax]
- Gộp các dòng thuộc cùng 1 khối (paragraph/tiêu đề) vào 1 phần tử
- Giữ nguyên tên riêng, số, ngày tháng`
    : `Bạn là chuyên gia OCR và dịch thuật. Hãy:
1. Đọc TOÀN BỘ văn bản có trong ảnh (từ ${src}).
2. Dịch sang ${dst}, giữ đúng nghĩa, giọng điệu, thuật ngữ chuyên ngành.
3. Giữ nguyên cấu trúc: mỗi vùng text một đoạn, tiêu đề/heading để riêng dòng, có thể dùng dấu "---" để tách các khối.
4. Giữ nguyên tên riêng, con số, ngày tháng, tên công ty/sản phẩm.
5. CHỈ trả về văn bản đã dịch, không thêm giải thích, không markdown fence.`;
  log(`Ô ${i+1}: đang dịch...`);
  try {
    const res = await ai.models.generateContent({
      model: "gemini-2.5-flash",
      contents: [{
        role: "user",
        parts: [
          { inlineData: { mimeType: row.mime, data: dataUrlToBase64(row.dataUrl) } },
          { text: prompt },
        ],
      }],
    });
    const text = res.text || res.candidates?.[0]?.content?.parts?.map(p=>p.text).filter(Boolean).join("\n") || "";
    if (isCanvas) {
      const cleaned = text.trim().replace(/^```(?:json)?/i, "").replace(/```$/,"").trim();
      try {
        row.regions = JSON.parse(cleaned);
        row.translation = row.regions.map(r => r.translated).join("\n---\n");
      } catch (e) {
        row.translation = text.trim();
        log(`Ô ${i+1}: cảnh báo - không parse được JSON, dùng text thường.`);
      }
    } else {
      row.translation = text.trim();
    }
    renderRows();
    log(`Ô ${i+1}: dịch xong (${text.length} ký tự).`);
  } catch (e) {
    log(`Ô ${i+1}: lỗi dịch - ${e.message}`);
  }
}

async function generateCanvas(i) {
  const row = rows[i];
  if (!row.regions || !row.regions.length) { log(`Ô ${i+1}: chưa có vùng text (dịch lại với chế độ Canvas).`); return; }
  const img = new Image();
  img.src = row.dataUrl;
  await new Promise(r => img.onload = r);
  const canvas = document.createElement("canvas");
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  // Sample background color from each box edge and repaint
  for (const reg of row.regions) {
    if (!reg.box || reg.box.length !== 4) continue;
    const [ymin, xmin, ymax, xmax] = reg.box;
    const x = xmin / 1000 * canvas.width;
    const y = ymin / 1000 * canvas.height;
    const w = (xmax - xmin) / 1000 * canvas.width;
    const h = (ymax - ymin) / 1000 * canvas.height;
    // Sample average color just above the box (fallback: white)
    let bg = "#ffffff";
    try {
      const sy = Math.max(0, Math.floor(y - 4));
      const sx = Math.max(0, Math.floor(x));
      const sw = Math.min(canvas.width - sx, Math.max(1, Math.floor(w)));
      const sh = Math.min(canvas.height - sy, 3);
      const d = ctx.getImageData(sx, sy, sw, sh).data;
      let r=0,g=0,b=0,n=0;
      for (let k=0;k<d.length;k+=4){r+=d[k];g+=d[k+1];b+=d[k+2];n++;}
      if (n) bg = `rgb(${r/n|0},${g/n|0},${b/n|0})`;
    } catch (_) {}
    // Detect if bg is dark to pick text color
    const m = bg.match(/\d+/g);
    const lum = m ? (0.299*+m[0]+0.587*+m[1]+0.114*+m[2]) : 255;
    const fg = lum > 140 ? "#000000" : "#ffffff";
    // Paint over original text
    ctx.fillStyle = bg;
    ctx.fillRect(x, y, w, h);
    // Fit and draw translated text
    drawWrappedText(ctx, reg.translated || "", x, y, w, h, fg);
  }
  row.resultMime = "image/png";
  row.resultDataUrl = canvas.toDataURL("image/png");
  renderRows();
  log(`Ô ${i+1}: canvas overlay xong (${row.regions.length} vùng).`);
}

function drawWrappedText(ctx, text, x, y, w, h, color) {
  if (!text) return;
  // Binary search largest font that fits
  let lo = 8, hi = Math.max(10, Math.floor(h));
  let best = { size: 8, lines: [text] };
  const fit = (size) => {
    ctx.font = `${size}px "Segoe UI", "Inter", Arial, sans-serif`;
    const words = text.split(/\s+/);
    const lines = [];
    let cur = "";
    for (const word of words) {
      const test = cur ? cur + " " + word : word;
      if (ctx.measureText(test).width <= w) cur = test;
      else { if (cur) lines.push(cur); cur = word; }
    }
    if (cur) lines.push(cur);
    const lineH = size * 1.2;
    return { lines, totalH: lines.length * lineH, lineH, widthMax: Math.max(...lines.map(l=>ctx.measureText(l).width)) };
  };
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    const r = fit(mid);
    if (r.totalH <= h && r.widthMax <= w) { best = { size: mid, ...r }; lo = mid + 1; }
    else hi = mid - 1;
  }
  ctx.font = `${best.size}px "Segoe UI", "Inter", Arial, sans-serif`;
  ctx.fillStyle = color;
  ctx.textBaseline = "top";
  const lineH = best.size * 1.2;
  best.lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lineH));
}

async function generateOne(i) {
  const row = rows[i];
  if (!row?.dataUrl) { log(`Ô ${i+1}: chưa có ảnh.`); return; }
  if (settings.imgModel === "canvas") { await generateCanvas(i); return; }
  if (!row.translation) { log(`Ô ${i+1}: chưa có bản dịch. Bấm "Dịch" trước.`); return; }
  const ai = getAI();
  const dst = langName(settings.dstLang);
  const prompt = `Tạo lại ảnh này nhưng thay toàn bộ văn bản gốc bằng bản dịch ${dst} sau đây.
YÊU CẦU NGHIÊM NGẶT:
- Giữ NGUYÊN layout, bố cục, vị trí các khối text, ảnh minh họa, màu nền, màu chữ, font style.
- Thay đúng vị trí: tiêu đề vào chỗ tiêu đề, đoạn văn vào chỗ đoạn văn.
- Tự điều chỉnh cỡ chữ để vừa khung, không tràn.
- KHÔNG được viết sai chính tả ${dst}, KHÔNG tự ý thêm/bớt nội dung.
- Chất lượng in ấn, nét, rõ ràng.

BẢN DỊCH:
${row.translation}`;
  log(`Ô ${i+1}: đang tạo ảnh (${settings.imgModel})...`);
  try {
    const res = await ai.models.generateContent({
      model: settings.imgModel,
      contents: [{
        role: "user",
        parts: [
          { inlineData: { mimeType: row.mime, data: dataUrlToBase64(row.dataUrl) } },
          { text: prompt },
        ],
      }],
      config: {
        responseModalities: ["TEXT", "IMAGE"],
        imageConfig: { imageSize: settings.imgSize || "1K" },
      },
    });
    const parts = res.candidates?.[0]?.content?.parts || [];
    const img = parts.find(p => p.inlineData);
    if (!img) {
      const txt = parts.map(p=>p.text).filter(Boolean).join("\n");
      throw new Error("Không có ảnh trả về. " + (txt || ""));
    }
    row.resultMime = img.inlineData.mimeType || "image/png";
    row.resultDataUrl = `data:${row.resultMime};base64,${img.inlineData.data}`;
    renderRows();
    log(`Ô ${i+1}: tạo ảnh xong.`);
  } catch (e) {
    log(`Ô ${i+1}: lỗi tạo ảnh - ${e.message}`);
  }
}

// -------- Bulk & download --------
async function runAllSequential(fn) {
  for (let i = 0; i < rows.length; i++) {
    if (rows[i]?.dataUrl) await fn(i);
  }
}

function downloadDataUrl(durl, name) {
  const a = document.createElement("a");
  a.href = durl; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
}
function downloadOne(i) {
  const row = rows[i];
  if (!row?.resultDataUrl) return;
  const ext = (row.resultMime || "image/png").split("/")[1] || "png";
  downloadDataUrl(row.resultDataUrl, `dich-${i+1}.${ext}`);
}
async function downloadZip() {
  const zip = new JSZip();
  let n = 0;
  rows.forEach((row, i) => {
    if (row?.resultDataUrl) {
      const ext = (row.resultMime || "image/png").split("/")[1] || "png";
      zip.file(`dich-${i+1}.${ext}`, dataUrlToBase64(row.resultDataUrl), { base64: true });
      n++;
    }
    if (row?.translation) {
      zip.file(`dich-${i+1}.txt`, row.translation);
    }
  });
  if (n === 0) { log("Chưa có ảnh kết quả để tải."); return; }
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  downloadDataUrl(url, `dich-anh-${Date.now()}.zip`);
  URL.revokeObjectURL(url);
  log(`Đã tải ZIP (${n} ảnh).`);
}

// -------- Wire top-level buttons --------
$("btnTranslateAll").onclick = () => runAllSequential(translateOne);
$("btnGenerateAll").onclick = () => runAllSequential(generateOne);
$("btnDownloadZip").onclick = downloadZip;
